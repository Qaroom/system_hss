controller_manager:
  ros__parameters:
    joint_trajectory_controller:
      type: "joint_trajectory_controller/JointTrajectoryController"

joint_trajectory_controller:
  ros__parameters:
    joints:
      - base_support_joint
      - support_right_mil_joint

    command_interfaces:
      - position
      - velocity

    state_interfaces:
      - position
      - velocity

    action_monitor_rate: 20.0

    allow_partial_joints_goal: false
    interpolate_from_desired_state: true
    allow_nonzero_velocity_at_trajectory_end: true

    # Toleransları optimize ettik
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time_tolerance: 0.2
      base_support_joint:
        trajectory: 0.05
        goal: 0.005
      support_right_mil_joint:
        trajectory: 0.05
        goal: 0.005
      support_right_mil_joint:
        trajectory: 0.05
        goal: 0.005


    # PID gains ekledik
    gains:
      base_support_joint:
        p: 15.0
        i: 0.0
        d: 0.1
        ff_velocity_scale: 1.2
      support_right_mil_joint:
        p: 12.0
        i: 0.0
        d: 0.1
        ff_velocity_scale: 1.2
